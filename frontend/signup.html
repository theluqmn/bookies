<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- ibm plex mono and ibm plex sans font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet" />

        <!-- tailwind css -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = { theme: { extend: { fontFamily: {
                sans: ['"IBM Plex Sans"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"]
            }}}};
        </script>
        
        <!-- htmx -->
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous" ></script>
    </head>

    <body class="bg-white">
        <main class="p-4">
          <form hx-post="http://localhost:6969/signup" hx-target="#message" hx-swap="innerHTML">
            <input type="text" name="id" placeholder="Your ID">
            <input type="text" name="name" placeholder="Your display name">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign Up</button>
          </form>
          <div id="message"></div>
        </main>
    </body>
</html>
