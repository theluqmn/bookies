<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Bookies</title>

        <!-- ibm plex mono and ibm plex sans font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet" />

        <!-- tailwind css -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['"IBM Plex Sans"', "sans-serif"],
                            mono: ['"IBM Plex Mono"', "monospace"],
                        },
                    },
                },
            };
        </script>

        <!-- htmx -->
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous" ></script>
    </head>

    <body class="p-4 bg-[rgb(200,200,200)]">
        <header class="p-2 flex flex-row justify-between items-center w-6/12 mx-auto bg-[rgb(20,20,20)]">
            <p class="text-white text-xl font-sans"><i>Bookies</i></p>
            <div class="flex flex-row gap-4">
                <button
                    class="p-1 bg-blue-600 hover:bg-blue-700 duration-300 text-white text-md font-sans"
                    onclick="window.open('', '_blank')"
                >Books</button>
                <button
                    class="p-1 bg-blue-600 hover:bg-blue-700 duration-300 text-white text-md font-sans"
                    onclick="window.open('', '_blank')"
                >Reviews</button>
            </div>
            <button
                class="p-1 bg-blue-600 hover:bg-blue-700 duration-300 text-white text-md font-sans"
                onclick="window.open('https://example.com', '_blank')"
            >Login / Signup</button>
        </header>

        <main>
            <h1 class="text-white font-sans">Hello world</h1>
        </main>
    </body>
</html>
