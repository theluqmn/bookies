<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Bookies</title>

        <!-- ibm plex mono/sans --><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet" />
        <!-- tailwind css --><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['"IBM Plex Sans"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"]}}}}</script>
        <!-- htmx --><script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script><script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2.0.4"></script>
    </head>

    <body class="p-2 flex flex-col gap-2 bg-white">
        <header class="p-4 md:w-7/12 mx-auto flex flex-row justify-between items-center
        bg-[rgb(245,245,245)] font-medium text-sm
        outline outline-1 outline-[rgb(50,50,50)]">
            <p class="text-lg font-semibold italic">Bookies</p>

            <div class="flex flex-row gap-5">
                <a href="/" class="pl-4 pr-4 p-1 outline outline-1 outline-[rgb(50,50,50)] bg-[rgb(245,245,245)] hover:bg-[rgb(200,200,200)] duration-300">
                    Home
                </a>
                
                <a href="/essays" class="pl-4 pr-4 p-1 outline outline-1 outline-[rgb(50,50,50)] bg-[rgb(245,245,245)] hover:bg-[rgb(200,200,200)] duration-300">
                    Essays
                </a>
            </div>

            <a href="/signup" class="p-1 bg-black hover:bg-[rgb(50,50,50)] duration-300 text-white text-sm font-sans">Login / Signup</a>
        </header>
        
        <main hx-ext="response-targets" class="p-4 md:w-7/12 mx-auto flex flex-col gap-4
        bg-[rgb(245,245,245)] font-medium text-sm
        outline outline-1 outline-[rgb(50,50,50)]">
            <form hx-post="http://localhost:6969/api/signup"
            hx-ext="response-targets" hx-target="#message" hx-target-4xx="#message" hx-on:form-success="setTimeout(() => { window.location.href = '/login' }, 2000)"
            hx-swap="innerHTML" class="flex flex-col gap-4 w-1/2 mx-auto">
                <label>Sign Up to Bookies</label>
                <input type="text" name="id" placeholder="Your ID" class="p-1 outline outline-1">
                <input type="text" name="name" placeholder="Your display name" class="p-1 outline outline-1">
                <input type="password" name="password" placeholder="Password" class="p-1 outline outline-1">
                <div class="flex flex-row gap-4 items-center">
                    <button type="submit" class="p-1 bg-black text-white hover:bg-[rgb(50,50,50)] duration-300">Sign Up</button>
                    <p>Already have an account? <a href="/login" class="text-blue-700 hover:underline">Log in</a>.</p>
                </div>
            </form>
            
            <div id="message" class="bg-red"></div>
        </main>

        <footer class="p-4 md:w-7/12 mx-auto
        bg-[rgb(245,245,245)] font-medium text-sm
        outline outline-1 outline-[rgb(50,50,50)]">
            <p>
                Designed and developed by <a href="https://theluqmn.github.io" class="text-blue-700 hover:underline">Luqman</a>.
                Hosted on <a href="https://hackclub.app" class="text-blue-700 hover:underline">Hack Club Nest</a>.
            </p>
        </footer>
    </body>
</html>
